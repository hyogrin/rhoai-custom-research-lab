services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doc-research-pgvector
    environment:
      POSTGRES_DB: doc_research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: doc-research-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: doc-research-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/documents --ignore-existing;
      echo 'Bucket created successfully';
      "

  searxng:
    image: dandehoon/searxng-mcp:latest
    container_name: doc-research-searxng
    environment:
      SEARXNG_MCP_TRANSPORT: "http"
      SEARXNG_MCP_PATH: "/mcp"
      SEARXNG_MCP_MAX_RESULTS: "10"
      SEARXNG_LANGUAGE: "en"
    ports:
      - "8888:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  minio_data:
