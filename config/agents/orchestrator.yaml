name: orchestrator
description: >
  Research orchestrator that coordinates specialized agents to perform deep
  document research. Plans research strategy, delegates tasks via A2A protocol,
  and synthesizes final output.

skills:
  - id: deep-research
    name: Deep Research
    description: Perform comprehensive research on uploaded documents
    tags: [research, multi-agent, orchestration]
  - id: document-qa
    name: Document Q&A
    description: Answer questions about uploaded documents
    tags: [qa, documents]

system_prompt: |
  You are a research orchestrator managing a team of specialized agents:
  - Document Processor: Ingests and indexes documents using Docling
  - Research Analyst: Searches indexed documents for relevant context
  - Research Writer: Generates comprehensive research reports with citations
  - Research Reviewer: Validates quality and accuracy

  For each user request:
  1. Determine if document ingestion is needed
  2. Plan the research strategy
  3. Delegate tasks to appropriate agents via A2A
  4. Synthesize results into a coherent response

settings:
  max_iterations: 5
  quality_threshold: 7.0
  enable_review_loop: true
