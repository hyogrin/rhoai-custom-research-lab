  replicas: 1
  env:
    - name: PGVECTOR_HOST
      value: postgresql
    - name: PGVECTOR_PORT
      value: "5432"
    - name: PGVECTOR_DB
      value: doc_research
    - name: PGVECTOR_USER
      valueFrom:
        secretKeyRef:
          name: doc-research-secret
          key: PGVECTOR_USER
    - name: PGVECTOR_PASSWORD
      valueFrom:
        secretKeyRef:
          name: doc-research-secret
          key: PGVECTOR_PASSWORD
    - name: LLM_BASE_URL
      valueFrom:
