    - name: LLM_API_KEY
      valueFrom:
        secretKeyRef:
          name: doc-research-secret
          key: LLM_API_KEY
    - name: LLM_MODEL
      value: granite-3.3-8b-instruct
    - name: EMBEDDING_BASE_URL
      valueFrom:
        secretKeyRef:
          name: doc-research-secret
          key: EMBEDDING_BASE_URL
    - name: EMBEDDING_MODEL
      value: granite-embedding-278m-multilingual
