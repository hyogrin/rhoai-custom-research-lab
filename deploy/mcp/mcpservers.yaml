---
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: vector-search-mcp
  namespace: doc-research-lab
  labels:
    app.kubernetes.io/part-of: doc-research
    app.kubernetes.io/component: mcp-tool
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: ${REGISTRY}/rhoai-custom-research-lab/vector_search_mcp:${IMAGE_TAG}
  config:
    port: 9002
  runtime:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
