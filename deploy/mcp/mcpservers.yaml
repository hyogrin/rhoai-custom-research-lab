---
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: doc-mcp
  namespace: doc-research-lab
  labels:
    app.kubernetes.io/part-of: doc-research
    kagenti.io/type: tool
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: ${REGISTRY}/rhoai-custom-research-lab/doc_mcp:${IMAGE_TAG}
  config:
    port: 9001
    storage:
      - path: /tmp
        permissions: ReadWrite
        source:
          type: EmptyDir
          emptyDir:
            sizeLimit: 100Mi
  runtime:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
---
