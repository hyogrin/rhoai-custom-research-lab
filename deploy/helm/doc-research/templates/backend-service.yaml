apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "doc-research.componentLabels" (dict "name" "backend" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "doc-research.selectorLabels" (dict "name" "backend" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
