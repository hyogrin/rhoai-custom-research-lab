apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    {{- include "doc-research.componentLabels" (dict "name" "frontend" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "doc-research.selectorLabels" (dict "name" "frontend" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "doc-research.componentLabels" (dict "name" "frontend" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: {{ include "doc-research.image" (dict "image" .Values.frontend.image "root" .) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.frontend.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
