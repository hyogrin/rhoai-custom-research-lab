apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-search-mcp
  namespace: doc-research-lab
  labels:
    app: web-search-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-search-mcp
  template:
    metadata:
      labels:
        app: web-search-mcp
    spec:
      containers:
        - name: web-search-mcp
          image: ${REGISTRY}/rhoai-custom-research-lab/web_search_mcp:${IMAGE_TAG}
          ports:
            - name: http
              containerPort: 9003
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /mcp/
              port: 9003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /mcp/
              port: 9003
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: SEARXNG_URL
              value: http://searxng:8888
---
apiVersion: v1
kind: Service
metadata:
  name: web-search-mcp
  namespace: doc-research-lab
  labels:
    app: web-search-mcp
spec:
  selector:
    app: web-search-mcp
  ports:
    - name: http
      port: 9003
      targetPort: 9003
      protocol: TCP
