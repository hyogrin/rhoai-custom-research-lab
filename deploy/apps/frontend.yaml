apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: doc-research-lab
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ${REGISTRY}/rhoai-custom-research-lab/frontend:${IMAGE_TAG}
          ports:
            - name: http
              containerPort: 7860
              protocol: TCP
          env:
            - name: API_URL
              value: http://backend:8000
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: doc-research-lab
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 7860
      targetPort: 7860
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend
  namespace: doc-research-lab
  labels:
    app: frontend
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
