apiVersion: apps/v1
kind: Deployment
metadata:
  name: verification-mcp
  namespace: doc-research-lab
  labels:
    app: verification-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verification-mcp
  template:
    metadata:
      labels:
        app: verification-mcp
    spec:
      containers:
        - name: verification-mcp
          image: ${REGISTRY}/rhoai-custom-research-lab/verification_mcp:${IMAGE_TAG}
          ports:
            - name: http
              containerPort: 9004
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /mcp/
              port: 9004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /mcp/
              port: 9004
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: LLM_BASE_URL
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: LLM_API_KEY
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: LLM_MODEL
            - name: MAAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: MAAS_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: verification-mcp
  namespace: doc-research-lab
  labels:
    app: verification-mcp
spec:
  selector:
    app: verification-mcp
  ports:
    - name: http
      port: 9004
      targetPort: 9004
      protocol: TCP
