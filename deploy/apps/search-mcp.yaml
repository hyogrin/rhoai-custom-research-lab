apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-mcp
  namespace: doc-research-lab
  labels:
    app: search-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-mcp
  template:
    metadata:
      labels:
        app: search-mcp
    spec:
      containers:
        - name: search-mcp
          image: ${REGISTRY}/rhoai-custom-research-lab/search_mcp:${IMAGE_TAG}
          ports:
            - name: http
              containerPort: 9002
              protocol: TCP
          env:
            - name: PGVECTOR_USER
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: PGVECTOR_USER
            - name: PGVECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: PGVECTOR_PASSWORD
            - name: EMBEDDING_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: EMBEDDING_BASE_URL
            - name: EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: EMBEDDING_API_KEY
            - name: EMBEDDING_MODEL
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: EMBEDDING_MODEL
            - name: PGVECTOR_HOST
              value: postgresql
            - name: PGVECTOR_PORT
              value: "5432"
            - name: PGVECTOR_DB
              value: doc_research
---
apiVersion: v1
kind: Service
metadata:
  name: search-mcp
  namespace: doc-research-lab
  labels:
    app: search-mcp
spec:
  selector:
    app: search-mcp
  ports:
    - name: http
      port: 9002
      targetPort: 9002
      protocol: TCP
