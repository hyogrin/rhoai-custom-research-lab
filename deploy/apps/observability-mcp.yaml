apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-mcp
  namespace: doc-research-lab
  labels:
    app: observability-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-mcp
  template:
    metadata:
      labels:
        app: observability-mcp
    spec:
      containers:
        - name: observability-mcp
          image: ${REGISTRY}/rhoai-custom-research-lab/observability_mcp:${IMAGE_TAG}
          ports:
            - name: http
              containerPort: 9005
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /mcp/
              port: 9005
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /mcp/
              port: 9005
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: PGVECTOR_USER
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: PGVECTOR_USER
            - name: PGVECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: PGVECTOR_PASSWORD
            - name: PGVECTOR_HOST
              value: postgresql
            - name: PGVECTOR_PORT
              value: "5432"
            - name: PGVECTOR_DB
              value: doc_research
---
apiVersion: v1
kind: Service
metadata:
  name: observability-mcp
  namespace: doc-research-lab
  labels:
    app: observability-mcp
spec:
  selector:
    app: observability-mcp
  ports:
    - name: http
      port: 9005
      targetPort: 9005
      protocol: TCP
