apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-mcp
  namespace: doc-research-lab
  labels:
    app: analysis-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-mcp
  template:
    metadata:
      labels:
        app: analysis-mcp
    spec:
      containers:
        - name: analysis-mcp
          image: ${REGISTRY}/rhoai-custom-research-lab/analysis_mcp:${IMAGE_TAG}
          ports:
            - name: http
              containerPort: 9003
              protocol: TCP
          env:
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: LLM_BASE_URL
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: LLM_API_KEY
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: doc-research-secret
                  key: LLM_MODEL
            - name: PGVECTOR_HOST
              value: postgresql
            - name: PGVECTOR_PORT
              value: "5432"
            - name: PGVECTOR_DB
              value: doc_research
---
apiVersion: v1
kind: Service
metadata:
  name: analysis-mcp
  namespace: doc-research-lab
  labels:
    app: analysis-mcp
spec:
  selector:
    app: analysis-mcp
  ports:
    - name: http
      port: 9003
      targetPort: 9003
      protocol: TCP
